# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via-ir = true
optimizer = true
optimizer-runs = 10000
gas_reports = [
    "Diamond",
    "LendOperation",
    "LendRewards",
    "Admin",
    "Getters",
    "Invest",
    "Operations",
    "Ownership",
    "OneInchAdapter"
]

[profile.lite]
src = "src"
out = "out"
libs = ["lib"]
optimizer = false

[lint]
exclude_lints = ["asm-keccak256"]

remappings = [
    'forge-std/=lib/forge-std/src/',
    '@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/',
    '@chainlink/contracts/=lib/chainlink-brownie-contracts/contracts/',
    '@layerzerolabs/oft-evm/=lib/devtools/packages/oft-evm/',
    '@layerzerolabs/oapp-evm/=lib/devtools/packages/oapp-evm/',
    '@layerzerolabs/lz-evm-protocol-v2/=lib/layerzero-v2/packages/layerzero-v2/evm/protocol/',
    '@layerzerolabs/test-devtools-evm-foundry/=lib/devtools/packages/test-devtools-evm-foundry/',
]

[rpc_endpoints]
mainnet = "https://ethereum-rpc.publicnode.com"
sepolia = "https://ethereum-sepolia-rpc.publicnode.com"
base-sepolia = "https://base-sepolia-rpc.publicnode.com"
arbitrum-sepolia = "https://arbitrum-sepolia-rpc.publicnode.com"
monad-testnet = "https://testnet-rpc.monad.xyz"
bsc-testnet = "https://bsc-testnet-dataseed.bnbchain.org"
polygon-testnet = "https://polygon-amoy-bor-rpc.publicnode.com"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
base-sepolia = { key = "${ETHERSCAN_API_KEY}" }
arbitrum-sepolia = { key = "${ETHERSCAN_API_KEY}" }
monad-testnet = { key = "${ETHERSCAN_API_KEY}" }
